<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>米me 🌌</title>
<meta http-equiv="refresh" content="0; url=./">
<link rel="icon" href="米.png" type="image/png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f0faf5,#f0ebe5,#eef5f0,#e8f0ee);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#4a4a4a;}
.box{text-align:center;padding:40px 24px;}
.box .emoji{font-size:4rem;margin-bottom:16px;}
.box h1{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#a8d8c8,#7ec8a8,#a8d8c8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.box p{color:#b0b8b0;font-size:0.88rem;font-weight:600;}
.box a{display:inline-block;margin-top:20px;padding:10px 28px;background:linear-gradient(135deg,#7b8cc8,#9b8cc8);color:#fff;text-decoration:none;border-radius:12px;font-weight:700;font-size:0.92rem;transition:all 0.25s;}
.box a:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(123,140,200,0.35);}
</style>
</head>
<body>
<div class="box">
  <div class="emoji">🌌</div>
  <h1>页面未找到</h1>
  <p>正在带你回到宇宙...</p>
  <a href="./">返回主页</a>
</div>
<script>
setTimeout(() => { window.location.href = './'; }, 2000);
</script>
</body>
</html>
